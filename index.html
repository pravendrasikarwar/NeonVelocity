<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Velocity: Cyber Escape</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;font-family:'Courier New',monospace;color:#fff}
  #c{display:block;width:100vw;height:100vh}
  #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
  .hud{position:absolute;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:flex-start}
  .stat{background:rgba(0,0,0,0.6);border:1px solid #0ff;border-radius:8px;padding:8px 14px;text-align:center;backdrop-filter:blur(4px)}
  .stat-val{font-size:22px;font-weight:bold;color:#0ff;text-shadow:0 0 10px #0ff}
  .stat-lbl{font-size:10px;color:#aaa;letter-spacing:2px}
  #pwbar{position:absolute;top:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);border:1px solid #f0f;border-radius:20px;padding:6px 20px;color:#f0f;font-size:12px;text-shadow:0 0 8px #f0f;display:none;letter-spacing:1px}
  #pwbar .fill{height:4px;background:linear-gradient(90deg,#f0f,#0ff);border-radius:2px;margin-top:4px;transition:width 0.1s}
  #screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.92)}
  #screen h1{font-size:clamp(28px,6vw,56px);font-weight:900;letter-spacing:4px;background:linear-gradient(90deg,#0ff,#f0f,#ff0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;text-align:center}
  #screen p{color:#888;font-size:13px;letter-spacing:2px;margin-bottom:30px}
  .btn{pointer-events:all;cursor:pointer;background:linear-gradient(135deg,#0ff2,#f0f2);border:1px solid #0ff;color:#0ff;padding:14px 36px;border-radius:40px;font-size:16px;letter-spacing:3px;margin:6px;transition:all .2s;text-transform:uppercase;font-family:inherit}
  .btn:hover{background:linear-gradient(135deg,#0ff4,#f0f4);box-shadow:0 0 20px #0ff8;transform:scale(1.05)}
  .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0;width:min(320px,90vw)}
  .sg{background:rgba(0,255,255,0.08);border:1px solid #0ff4;border-radius:8px;padding:10px;text-align:center}
  .sg-v{font-size:20px;color:#0ff;font-weight:bold}
  .sg-l{font-size:10px;color:#666;letter-spacing:2px}
  #tips{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:11px;color:#444;letter-spacing:2px;z-index:20;text-align:center}
  #combo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;color:#ff0;text-shadow:0 0 20px #ff0;opacity:0;transition:opacity 0.3s;pointer-events:none;letter-spacing:3px}
  .lane-ind{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
  .ld{width:8px;height:8px;border-radius:50%;background:#333;border:1px solid #555;transition:all .2s}
  .ld.active{background:#0ff;box-shadow:0 0 8px #0ff}
  #shield-ind{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:3px solid #0ff;opacity:0;pointer-events:none;transition:opacity .5s;box-shadow:0 0 30px #0ff inset,0 0 30px #0ff}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="hud">
    <div class="stat"><div class="stat-val" id="scoreV">0</div><div class="stat-lbl">SCORE</div></div>
    <div class="stat"><div class="stat-val" id="distV">0m</div><div class="stat-lbl">DISTANCE</div></div>
    <div class="stat"><div class="stat-val" id="coinsV">0</div><div class="stat-lbl">COINS</div></div>
    <div class="stat"><div class="stat-val" id="speedV">0</div><div class="stat-lbl">km/h</div></div>
  </div>
  <div id="pwbar"><span id="pwname">ROCKET</span><div class="fill" id="pwfill" style="width:100%"></div></div>
  <div id="combo">COMBO x2!</div>
  <div class="lane-ind"><div class="ld" id="l0"></div><div class="ld active" id="l1"></div><div class="ld" id="l2"></div></div>
  <div id="shield-ind"></div>
</div>
<div id="screen">
  <h1>NEON VELOCITY</h1>
  <p>CYBER ESCAPE</p>
  <button class="btn" onclick="startGame()">▶ PLAY</button>
  <br><small style="color:#333;font-size:10px;letter-spacing:2px">A/D or ← → = LANE &nbsp;|&nbsp; SPACE = JUMP &nbsp;|&nbsp; ↓ = SLIDE</small>
</div>
<div id="tips">SWIPE to control on mobile</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── GLOBALS ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000814, 0.018);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 400);
camera.position.set(0, 3.5, 8);

let W = innerWidth, H = innerHeight;
renderer.setSize(W, H);

// ── STATE ─────────────────────────────────────────────────────────────────────
const G = {
  running:false, dead:false,
  speed:12, baseSpeed:12, maxSpeed:38,
  score:0, coins:0, distance:0, hiScore:0,
  lane:1, targetLane:1,
  y:0, vy:0, onGround:true,
  sliding:false, slideTimer:0,
  power:null, powerTimer:0,
  shield:false, magnet:false, rocket:false,
  multiplier:1, comboTimer:0,
  time:0, nightCycle:0,
  camShake:0,
};
const LANE_X = [-2.4, 0, 2.4];
const GRAVITY = -28;
const JUMP_V  = 11;

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let AC;
function initAudio(){
  try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
}
function playTone(freq, type='sine', dur=0.15, vol=0.3, delay=0){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol, AC.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay); o.stop(AC.currentTime+delay+dur);
}
function sfxCoin(){ playTone(880,'sine',0.1,0.2); playTone(1320,'sine',0.1,0.15,0.05); }
function sfxJump(){ playTone(300,'sawtooth',0.15,0.2); playTone(500,'sine',0.2,0.15,0.05); }
function sfxCrash(){ playTone(120,'sawtooth',0.4,0.4); playTone(80,'square',0.5,0.3,0.05); }
function sfxPower(){ [400,600,800,1000].forEach((f,i)=>playTone(f,'sine',0.2,0.25,i*0.06)); }

// ── MATERIALS ─────────────────────────────────────────────────────────────────
const MAT = {
  road: new THREE.MeshLambertMaterial({color:0x111122}),
  roadLine: new THREE.MeshLambertMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:0.3}),
  neonB: new THREE.MeshLambertMaterial({color:0x00ffff,emissive:0x00ffff,emissiveIntensity:1.5}),
  neonP: new THREE.MeshLambertMaterial({color:0xff00ff,emissive:0xff00ff,emissiveIntensity:1.5}),
  neonY: new THREE.MeshLambertMaterial({color:0xffff00,emissive:0xffff00,emissiveIntensity:1.2}),
  neonR: new THREE.MeshLambertMaterial({color:0xff2244,emissive:0xff2244,emissiveIntensity:1.2}),
  glass: new THREE.MeshLambertMaterial({color:0x0044aa,emissive:0x001133,transparent:true,opacity:0.7}),
  metal: new THREE.MeshLambertMaterial({color:0x334455}),
  gold:  new THREE.MeshLambertMaterial({color:0xffcc00,emissive:0xffaa00,emissiveIntensity:0.8}),
  shield:new THREE.MeshLambertMaterial({color:0x00ffff,emissive:0x00ffff,emissiveIntensity:0.5,transparent:true,opacity:0.25,side:THREE.DoubleSide}),
};

// ── LIGHTING ──────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x112244, 0.8);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0x6688ff, 0.6);
sun.position.set(5, 20, -10);
sun.castShadow = true;
sun.shadow.camera.near = 1; sun.shadow.camera.far = 100;
sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
sun.shadow.camera.top = 20; sun.shadow.camera.bottom = -20;
sun.shadow.mapSize.set(1024,1024);
scene.add(sun);
const fogLight = new THREE.PointLight(0x00ffff, 2, 30);
fogLight.position.set(0, 8, -15);
scene.add(fogLight);
const fogLight2 = new THREE.PointLight(0xff00ff, 1.5, 25);
fogLight2.position.set(0, 6, -5);
scene.add(fogLight2);

// ── PLAYER ────────────────────────────────────────────────────────────────────
let player, playerParts = {}, shieldMesh;
function buildPlayer(){
  player = new THREE.Group();
  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.8,0.4), new THREE.MeshLambertMaterial({color:0x223366,emissive:0x112244,emissiveIntensity:0.3}));
  body.position.y = 0.9; body.castShadow=true; playerParts.body=body; player.add(body);
  // Chest stripe
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.62,0.15,0.42), MAT.neonB);
  stripe.position.y = 0.95; playerParts.stripe=stripe; player.add(stripe);
  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.45,0.42,0.42), new THREE.MeshLambertMaterial({color:0xffcc99}));
  head.position.y = 1.55; head.castShadow=true; playerParts.head=head; player.add(head);
  // Visor
  const visor = new THREE.Mesh(new THREE.BoxGeometry(0.46,0.15,0.2), MAT.neonB);
  visor.position.set(0,1.57,0.22); player.add(visor);
  // Arms
  [-0.45,0.45].forEach((x,i)=>{
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.6,0.18), new THREE.MeshLambertMaterial({color:0x223366}));
    arm.position.set(x,0.9,0); arm.castShadow=true;
    playerParts['arm'+i]=arm; player.add(arm);
  });
  // Legs
  [-0.15,0.15].forEach((x,i)=>{
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.22,0.65,0.22), new THREE.MeshLambertMaterial({color:0x111133}));
    leg.position.set(x,0.3,0); leg.castShadow=true;
    playerParts['leg'+i]=leg; player.add(leg);
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.23,0.12,0.32), MAT.neonB);
    shoe.position.set(x,-0.02,0.05); player.add(shoe);
  });
  // Shield bubble
  shieldMesh = new THREE.Mesh(new THREE.SphereGeometry(1.1,16,12), MAT.shield);
  shieldMesh.position.y = 0.9; shieldMesh.visible=false; player.add(shieldMesh);
  player.position.set(0, 0, 0);
  scene.add(player);
}

// ── TRACK CHUNKS ──────────────────────────────────────────────────────────────
const CHUNK_LEN = 40, POOL_SIZE = 8;
let chunks=[], chunkZ=0;
const chunkPool=[];

function makeChunk(z){
  let ch;
  if(chunkPool.length){ ch=chunkPool.pop(); ch.group.visible=true; }
  else{
    ch={group:new THREE.Group(), meshes:[], lights:[], z:0};
    scene.add(ch.group);
  }
  // clear
  ch.group.children.slice().forEach(c=>ch.group.remove(c));
  ch.lights=[];
  ch.z = z;
  ch.group.position.z = z;

  // Road surface
  const road = new THREE.Mesh(new THREE.PlaneGeometry(9,CHUNK_LEN), MAT.road);
  road.rotation.x=-Math.PI/2; road.position.set(0,0,-CHUNK_LEN/2);
  road.receiveShadow=true; ch.group.add(road);

  // Lane lines
  for(let i=-1;i<=1;i++){
    const ll = new THREE.Mesh(new THREE.PlaneGeometry(0.1,CHUNK_LEN), MAT.roadLine);
    ll.rotation.x=-Math.PI/2; ll.position.set(i*2.4,0.01,-CHUNK_LEN/2); ch.group.add(ll);
  }
  // Edge glow strips
  [-4.6,4.6].forEach((x,i)=>{
    const s=new THREE.Mesh(new THREE.PlaneGeometry(0.2,CHUNK_LEN), i===0?MAT.neonB:MAT.neonP);
    s.rotation.x=-Math.PI/2; s.position.set(x,0.02,-CHUNK_LEN/2); ch.group.add(s);
    const pl=new THREE.PointLight(i===0?0x00ffff:0xff00ff,1.5,12);
    pl.position.set(x,1,-CHUNK_LEN/4); ch.group.add(pl); ch.lights.push(pl);
  });

  // Buildings on sides
  for(let side=-1;side<=1;side+=2){
    for(let bz=0;bz<CHUNK_LEN;bz+=8+Math.random()*6){
      const bw=4+Math.random()*6, bh=8+Math.random()*25, bd=4+Math.random()*5;
      const bx=side*(7+bw/2+Math.random()*3);
      const mat=new THREE.MeshLambertMaterial({color:new THREE.Color(0.05+Math.random()*0.1,0.05+Math.random()*0.1,0.12+Math.random()*0.15)});
      const b=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd),mat);
      b.position.set(bx,bh/2,-bz-bd/2); b.castShadow=true; ch.group.add(b);
      // Windows
      const wc=new THREE.Color(Math.random()<0.5?0x00ffff:0xff00ff);
      const wm=new THREE.MeshLambertMaterial({color:wc,emissive:wc,emissiveIntensity:0.8,transparent:true,opacity:0.9});
      for(let wy=2;wy<bh-1;wy+=2.5){
        for(let wx=-bw/2+1;wx<bw/2;wx+=2){
          if(Math.random()<0.6){
            const win=new THREE.Mesh(new THREE.PlaneGeometry(0.8,0.6),wm);
            win.position.set(bx+wx,wy,-bz-(side<0?bd:0));
            if(side>0) win.rotation.y=Math.PI;
            ch.group.add(win);
          }
        }
      }
      // Rooftop neon
      const nc=[0x00ffff,0xff00ff,0xff2244,0xffff00][Math.floor(Math.random()*4)];
      const nm=new THREE.MeshLambertMaterial({color:nc,emissive:nc,emissiveIntensity:2});
      const nr=new THREE.Mesh(new THREE.BoxGeometry(bw+0.2,0.2,0.2),nm);
      nr.position.set(bx,bh,-bz); ch.group.add(nr);
    }
  }

  // Sky arches / bridges
  if(Math.random()<0.4){
    const archH=5+Math.random()*4, archZ=-(10+Math.random()*20);
    const arch=new THREE.Mesh(new THREE.TorusGeometry(5,0.2,8,20,Math.PI), MAT.neonP);
    arch.position.set(0,archH,archZ); arch.rotation.z=Math.PI; ch.group.add(arch);
  }

  return ch;
}

// ── OBSTACLES & COINS ─────────────────────────────────────────────────────────
let objects=[];
const OBJ_POOL=[];

function spawnObject(z){
  const r=Math.random();
  if(r<0.35) spawnCoin(z);
  else if(r<0.55) spawnObstacle(z,'barrier');
  else if(r<0.70) spawnObstacle(z,'laser');
  else if(r<0.82) spawnObstacle(z,'car');
  else if(r<0.90) spawnObstacle(z,'drone');
  else spawnPowerup(z);
}

function makeMesh(geo,mat){
  return new THREE.Mesh(geo,mat);
}

function spawnCoin(z){
  const lane=Math.floor(Math.random()*3);
  const count=3+Math.floor(Math.random()*5);
  for(let i=0;i<count;i++){
    const m=makeMesh(new THREE.TorusGeometry(0.22,0.06,8,16), MAT.gold);
    m.position.set(LANE_X[lane],0.7,z-i*1.4);
    m.castShadow=true;
    scene.add(m);
    objects.push({mesh:m,type:'coin',lane,alive:true});
  }
}

function spawnObstacle(z,type){
  const lane=Math.floor(Math.random()*3);
  let m, data={type,lane,alive:true,z};
  if(type==='barrier'){
    m=makeMesh(new THREE.BoxGeometry(2.2,1.0,0.4), MAT.neonR);
    m.position.set(LANE_X[lane],0.5,z);
    data.jumpable=true; data.h=1.0;
  } else if(type==='laser'){
    m=makeMesh(new THREE.BoxGeometry(2.2,0.5,0.15), MAT.neonB);
    m.position.set(LANE_X[lane],1.15,z);
    data.slideable=true;
    // pole
    const pole=makeMesh(new THREE.CylinderGeometry(0.06,0.06,1.5,8), MAT.metal);
    pole.position.set(LANE_X[lane]-0.9,0.75,z); scene.add(pole);
    objects.push({mesh:pole,type:'deco',alive:true});
    const pole2=makeMesh(new THREE.CylinderGeometry(0.06,0.06,1.5,8), MAT.metal);
    pole2.position.set(LANE_X[lane]+0.9,0.75,z); scene.add(pole2);
    objects.push({mesh:pole2,type:'deco',alive:true});
  } else if(type==='car'){
    m=makeMesh(new THREE.BoxGeometry(1.8,0.8,3.2), MAT.metal);
    m.position.set(LANE_X[lane],0.4,z);
    // car top
    const top=makeMesh(new THREE.BoxGeometry(1.4,0.55,1.8), new THREE.MeshLambertMaterial({color:0x223355}));
    top.position.y=0.68; m.add(top);
    // headlights
    const hl=new THREE.PointLight(0xffffff,2,6);
    hl.position.set(0,0.2,-1.8); m.add(hl);
    data.isCar=true; data.h=0.8;
  } else if(type==='drone'){
    m=new THREE.Group();
    const body=makeMesh(new THREE.OctahedronGeometry(0.35,0), MAT.neonP);
    m.add(body);
    [-0.5,0.5].forEach(x=>{
      const arm=makeMesh(new THREE.CylinderGeometry(0.04,0.04,1,8), MAT.metal);
      arm.rotation.z=Math.PI/2; arm.position.x=x; m.add(arm);
      const prop=makeMesh(new THREE.SphereGeometry(0.18,8,4), MAT.neonB);
      prop.position.x=x<0?-0.5:0.5; m.add(prop);
    });
    m.position.set(LANE_X[lane],2.2,z);
    data.drone=true; data.h=0.5; data.y=2.2;
    scene.add(m); data.mesh=m; objects.push(data); return;
  }
  m.castShadow=true; scene.add(m);
  data.mesh=m; objects.push(data);
}

const POWERUP_TYPES=['rocket','magnet','shield','hover','multi'];
const POWERUP_MATS={
  rocket:new THREE.MeshLambertMaterial({color:0xff4400,emissive:0xff2200,emissiveIntensity:1.2}),
  magnet:new THREE.MeshLambertMaterial({color:0xff00ff,emissive:0xff00ff,emissiveIntensity:1}),
  shield:new THREE.MeshLambertMaterial({color:0x00ffff,emissive:0x00ffff,emissiveIntensity:1}),
  hover:new THREE.MeshLambertMaterial({color:0x00ff88,emissive:0x00ff44,emissiveIntensity:1}),
  multi:new THREE.MeshLambertMaterial({color:0xffff00,emissive:0xffff00,emissiveIntensity:1.2}),
};
function spawnPowerup(z){
  const lane=Math.floor(Math.random()*3);
  const ptype=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  const m=makeMesh(new THREE.OctahedronGeometry(0.4,1), POWERUP_MATS[ptype]);
  m.position.set(LANE_X[lane],1.2,z); m.castShadow=true;
  scene.add(m);
  objects.push({mesh:m,type:'powerup',ptype,lane,alive:true});
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
let particles=[];
function burst(pos, color=0xffcc00, count=12){
  for(let i=0;i<count;i++){
    const m=makeMesh(new THREE.SphereGeometry(0.07,4,4), new THREE.MeshLambertMaterial({color,emissive:color,emissiveIntensity:2}));
    m.position.copy(pos);
    const v=new THREE.Vector3((Math.random()-.5)*6,(Math.random()+0.3)*5,(Math.random()-.5)*3);
    scene.add(m);
    particles.push({mesh:m,v,life:0.7,maxLife:0.7});
  }
}

// ── RAIN ──────────────────────────────────────────────────────────────────────
let rainMesh;
function buildRain(){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(1500*3);
  for(let i=0;i<1500;i++){
    pos[i*3]=  (Math.random()-.5)*50;
    pos[i*3+1]=Math.random()*30;
    pos[i*3+2]=Math.random()*60-40;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  rainMesh=new THREE.Points(geo,new THREE.PointsMaterial({color:0x88ccff,size:0.08,transparent:true,opacity:0.6}));
  scene.add(rainMesh);
}

// ── FLYING CARS (BG) ──────────────────────────────────────────────────────────
let flyCars=[];
function buildFlyCars(){
  for(let i=0;i<8;i++){
    const fc=makeMesh(new THREE.BoxGeometry(1.6,0.4,3), new THREE.MeshLambertMaterial({color:0x223355}));
    fc.position.set((Math.random()-.5)*30, 6+Math.random()*12, -20-Math.random()*60);
    const fl=new THREE.PointLight(Math.random()<0.5?0xff2244:0x00ffff,1.5,5);
    fl.position.set(0,0,-1.6); fc.add(fl);
    scene.add(fc);
    flyCars.push({mesh:fc, speed:4+Math.random()*6, side:Math.random()<0.5?1:-1});
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildPlayer();
buildRain();
buildFlyCars();
for(let i=0;i<POOL_SIZE;i++){
  const ch=makeChunk(-i*CHUNK_LEN);
  chunks.push(ch);
  chunkZ -= CHUNK_LEN;
}
let nextObjZ = -20;

// ── INPUT ─────────────────────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(!G.running||G.dead) return;
  if(e.code==='ArrowLeft'||e.code==='KeyA') changeLane(-1);
  if(e.code==='ArrowRight'||e.code==='KeyD') changeLane(1);
  if((e.code==='Space'||e.code==='ArrowUp')&&G.onGround){ doJump(); e.preventDefault(); }
  if(e.code==='ArrowDown') doSlide();
  e.code==='Space'&&e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });

let touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!G.running||G.dead) return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)){
    if(Math.abs(dx)>30) changeLane(dx>0?1:-1);
  } else {
    if(dy<-30) doJump();
    if(dy>30) doSlide();
  }
},{passive:true});

function changeLane(d){
  const nl=Math.max(0,Math.min(2,G.lane+d));
  if(nl!==G.lane){ G.targetLane=nl; G.lane=nl; }
}
function doJump(){
  if(!G.onGround) return;
  G.vy=JUMP_V; G.onGround=false; sfxJump();
}
function doSlide(){
  if(!G.onGround||G.sliding) return;
  G.sliding=true; G.slideTimer=0.7;
}

// ── GAME START / OVER ─────────────────────────────────────────────────────────
function startGame(){
  initAudio();
  document.getElementById('screen').style.display='none';
  G.running=true; G.dead=false;
  G.score=0; G.coins=0; G.distance=0;
  G.speed=G.baseSpeed; G.lane=1; G.targetLane=1;
  G.y=0; G.vy=0; G.onGround=true;
  G.sliding=false; G.power=null; G.shield=false;
  G.rocket=false; G.magnet=false; G.multiplier=1;
  G.time=0; G.camShake=0;
  player.position.set(0,0,0);
  objects.forEach(o=>{ scene.remove(o.mesh); });
  objects=[]; particles=[]; nextObjZ=-20;
  sfxPower();
}

function gameOver(){
  G.running=false; G.dead=true;
  sfxCrash();
  G.camShake=0.6;
  if(G.score>G.hiScore) G.hiScore=G.score;
  setTimeout(()=>{
    const sc=document.getElementById('screen');
    sc.style.display='flex';
    sc.innerHTML=`<h1>GAME OVER</h1>
    <div class="score-grid">
      <div class="sg"><div class="sg-v">${Math.floor(G.score)}</div><div class="sg-l">SCORE</div></div>
      <div class="sg"><div class="sg-v">${Math.floor(G.distance)}m</div><div class="sg-l">DISTANCE</div></div>
      <div class="sg"><div class="sg-v">${G.coins}</div><div class="sg-l">COINS</div></div>
      <div class="sg"><div class="sg-v">${Math.floor(G.hiScore)}</div><div class="sg-l">BEST</div></div>
    </div>
    <button class="btn" onclick="startGame()">▶ RETRY</button>`;
  },800);
}

// ── COLLISION ─────────────────────────────────────────────────────────────────
function checkCollision(o){
  const px=player.position.x, pz=player.position.z;
  const ox=o.mesh.position.x, oz=o.mesh.position.z;
  const py=G.y, oy=o.mesh.position.y;
  const dz=Math.abs(pz-oz), dx=Math.abs(px-ox);
  if(dz>2.5||dx>1.5) return false;
  if(o.type==='coin'||o.type==='powerup') return dx<1.2&&dz<1.0;
  if(o.jumpable){ return !(G.y>0.9); }
  if(o.slideable){ return !(G.sliding); }
  if(o.drone){ return dz<1.2&&dx<1.0&&!(G.y>1.5); }
  return dz<1.5&&dx<1.2;
}

// ── POWERUP LOGIC ─────────────────────────────────────────────────────────────
function activatePower(ptype){
  sfxPower();
  G.power=ptype; G.powerTimer=8;
  G.shield=false; G.magnet=false; G.rocket=false;
  if(ptype==='shield') G.shield=true;
  if(ptype==='magnet') G.magnet=true;
  if(ptype==='rocket'){ G.rocket=true; G.vy=0; }
  if(ptype==='hover') G.extraJump=true;
  if(ptype==='multi') G.multiplier=3;
  document.getElementById('pwbar').style.display='block';
  document.getElementById('pwname').textContent=ptype.toUpperCase();
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
let last=0;
function tick(ts){
  requestAnimationFrame(tick);
  const dt=Math.min((ts-last)/1000,0.05); last=ts;

  // Night cycle
  G.nightCycle+=dt*0.05;
  const nightT=(Math.sin(G.nightCycle)+1)/2;
  scene.fog.color.setRGB(0,0.03+nightT*0.03,0.05+nightT*0.08);
  ambient.intensity=0.4+nightT*0.4;

  // Rain
  if(rainMesh){
    const pos=rainMesh.geometry.attributes.position;
    for(let i=0;i<pos.count;i++){
      pos.array[i*3+1]-=18*dt;
      pos.array[i*3+2]+=G.speed*dt;
      if(pos.array[i*3+1]<0){ pos.array[i*3+1]=25; pos.array[i*3+2]=player.position.z-3; }
      if(pos.array[i*3+2]>player.position.z+5) pos.array[i*3+2]=player.position.z-55;
    }
    pos.needsUpdate=true;
  }

  // Flying cars
  flyCars.forEach(fc=>{
    fc.mesh.position.x+=fc.side*fc.speed*dt;
    if(Math.abs(fc.mesh.position.x)>30){ fc.side*=-1; }
    fc.mesh.position.z+=G.speed*0.15*dt;
    if(fc.mesh.position.z>player.position.z+10) fc.mesh.position.z=player.position.z-80;
  });

  if(!G.running){ renderer.render(scene,camera); return; }

  G.time+=dt;
  G.distance+=G.speed*dt;
  G.speed=Math.min(G.maxSpeed, G.baseSpeed+G.distance*0.004);
  G.score+=G.speed*dt*G.multiplier;

  // Move player Z
  player.position.z -= G.speed*dt;

  // Lane transition
  const tx=LANE_X[G.lane];
  player.position.x += (tx-player.position.x)*12*dt;

  // Physics
  if(G.rocket){
    G.y += (2.5-G.y)*6*dt;
    G.vy=0;
  } else {
    G.vy+=GRAVITY*dt;
    G.y+=G.vy*dt;
    if(G.y<=0){ G.y=0; G.vy=0; G.onGround=true; G.extraJump=false; }
    else { G.onGround=false; }
  }
  player.position.y=G.y;

  // Slide
  if(G.sliding){
    G.slideTimer-=dt;
    if(G.slideTimer<=0){ G.sliding=false; }
    player.scale.y=0.5; player.position.y=G.y;
  } else { player.scale.y=1; }

  // Run animation
  const t=G.time*12;
  if(playerParts.leg0) playerParts.leg0.rotation.x=G.onGround?Math.sin(t)*0.6:0.3;
  if(playerParts.leg1) playerParts.leg1.rotation.x=G.onGround?-Math.sin(t)*0.6:-0.3;
  if(playerParts.arm0) playerParts.arm0.rotation.x=G.onGround?-Math.sin(t)*0.5:0;
  if(playerParts.arm1) playerParts.arm1.rotation.x=G.onGround?Math.sin(t)*0.5:0;
  if(playerParts.body) playerParts.body.rotation.z=(LANE_X[G.lane]-player.position.x)*0.15;

  // Shield visual
  shieldMesh.visible=G.shield;
  if(G.shield) shieldMesh.rotation.y+=dt*2;

  // Power-up timer
  if(G.power){
    G.powerTimer-=dt;
    const frac=Math.max(0,G.powerTimer/8);
    document.getElementById('pwfill').style.width=(frac*100)+'%';
    if(G.powerTimer<=0){
      G.power=null; G.shield=false; G.magnet=false; G.rocket=false; G.multiplier=1;
      document.getElementById('pwbar').style.display='none';
    }
  }

  // Chunk management
  const camZ=player.position.z;
  if(camZ<chunkZ+CHUNK_LEN*2){
    const ch=makeChunk(chunkZ);
    chunks.push(ch); chunkZ-=CHUNK_LEN;
    if(chunks.length>POOL_SIZE+2){ const old=chunks.shift(); old.group.visible=false; chunkPool.push(old); }
  }

  // Spawn objects
  if(nextObjZ>camZ-10) nextObjZ=camZ-10;
  while(nextObjZ>camZ-60){
    nextObjZ-=4+Math.random()*5;
    if(nextObjZ<camZ-15) spawnObject(nextObjZ);
  }

  // Update objects
  objects.forEach(o=>{
    if(!o.alive) return;
    // rotate coins/powerups
    if(o.type==='coin'||o.type==='powerup'){
      o.mesh.rotation.y+=dt*3;
      o.mesh.position.y=( o.type==='coin'?0.7:1.2 )+Math.sin(G.time*3+o.mesh.position.z)*0.15;
    }
    // drone bob
    if(o.drone){ o.mesh.rotation.y+=dt*2; o.mesh.position.y=o.y+Math.sin(G.time*2)*0.3; }

    // Magnet pull coins
    if(G.magnet&&o.type==='coin'){
      const dx=player.position.x-o.mesh.position.x;
      const dz=player.position.z-o.mesh.position.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist<6){ o.mesh.position.x+=dx/dist*12*dt; o.mesh.position.z+=dz/dist*12*dt; }
    }

    // Auto collect coins in rocket mode
    if(G.rocket&&o.type==='coin'){
      const dz=Math.abs(o.mesh.position.z-player.position.z);
      const dx=Math.abs(o.mesh.position.x-player.position.x);
      if(dz<3&&dx<4){ collectCoin(o); return; }
    }

    // Collision check
    if(o.mesh.position.z>player.position.z+4) return;
    if(o.mesh.position.z<player.position.z-4){ cleanObj(o); return; }
    if(!checkCollision(o)) return;

    if(o.type==='coin'){ collectCoin(o); }
    else if(o.type==='powerup'){ activatePower(o.ptype); cleanObj(o); }
    else if(o.type!=='deco'){
      if(G.shield){ G.shield=false; G.power=null; G.powerTimer=0; cleanObj(o); burst(o.mesh.position,0x00ffff,20); }
      else{ gameOver(); }
    }
  });

  // Remove dead objs & clean far ones
  objects=objects.filter(o=>{
    if(!o.alive) return false;
    if(o.mesh.position.z>player.position.z+10){ cleanObj(o); return false; }
    return true;
  });

  // Particles
  particles.forEach(p=>{
    p.life-=dt;
    p.v.y+=GRAVITY*0.3*dt;
    p.mesh.position.addScaledVector(p.v,dt);
    p.mesh.scale.setScalar(p.life/p.maxLife);
    if(p.life<=0) scene.remove(p.mesh);
  });
  particles=particles.filter(p=>p.life>0);

  // Camera
  G.camShake=Math.max(0,G.camShake-dt*3);
  const targetCamX=player.position.x*0.3;
  const targetCamY=player.position.y+3.5+(G.rocket?1.5:0);
  const targetCamZ=player.position.z+8;
  camera.position.x+=(targetCamX-camera.position.x)*8*dt;
  camera.position.y+=(targetCamY-camera.position.y)*6*dt;
  camera.position.z+=(targetCamZ-camera.position.z)*8*dt;
  if(G.camShake>0){
    camera.position.x+=(Math.random()-.5)*G.camShake*0.5;
    camera.position.y+=(Math.random()-.5)*G.camShake*0.3;
  }
  camera.lookAt(player.position.x*0.2, player.position.y+1, player.position.z-3);

  // HUD
  document.getElementById('scoreV').textContent=Math.floor(G.score);
  document.getElementById('distV').textContent=Math.floor(G.distance)+'m';
  document.getElementById('coinsV').textContent=G.coins;
  document.getElementById('speedV').textContent=Math.floor(G.speed*3.6/3);
  // Lane indicators
  [0,1,2].forEach(i=>document.getElementById('l'+i).classList.toggle('active',i===G.lane));

  // Neon lights pulse
  fogLight.intensity=1.5+Math.sin(G.time*3)*0.5;
  fogLight2.intensity=1+Math.sin(G.time*2.3+1)*0.5;
  fogLight.position.z=player.position.z-15;
  fogLight2.position.z=player.position.z-5;

  renderer.render(scene,camera);
}

function collectCoin(o){
  sfxCoin();
  G.coins++;
  G.score+=10*G.multiplier;
  burst(o.mesh.position,0xffcc00,8);
  cleanObj(o);
}
function cleanObj(o){
  o.alive=false;
  scene.remove(o.mesh);
  if(o.mesh.children) o.mesh.children.forEach(c=>{ if(c.isLight) o.mesh.remove(c); });
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  W=innerWidth; H=innerHeight;
  renderer.setSize(W,H);
  camera.aspect=W/H; camera.updateProjectionMatrix();
});

requestAnimationFrame(tick);
</script>
</body>
</html>
